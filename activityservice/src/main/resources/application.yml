spring:
  application:
    name: activityservice
  datasource:
    url: jdbc:h2:mem:fitnessdb
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

server:
  port: 8081