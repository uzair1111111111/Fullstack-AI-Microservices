server:
  port: 8082

spring:
  application:
    name: aiservice

  # H2 Database Settings
  datasource:
    url: jdbc:h2:mem:aidb
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

# Activity Service ka rasta
services:
  activity-service:
    url: http://localhost:8081

# Gemini API Configuration
gemini:
  api:
    # URL ko yahan tak rakhein, baaki code mein manage hoga
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash
    key: "AIzaSyCbCbaqQUmxOp0mRaOR1p36fOcIvnTfFRE"